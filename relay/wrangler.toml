name = "foresight-relay"
main = "worker.js"
compatibility_date = "2026-07-01"

# Secrets (NOT stored here). Set for production with:
#   wrangler secret put TXLINE_JWT
#   wrangler secret put TXLINE_API_TOKEN
#   wrangler secret put TXLINE_HOST      # optional; defaults to devnet host
# Local dev reads them from relay/.dev.vars (gitignored).

[observability]
enabled = true

# Shared token buckets, concurrent-SSE admission, and freshness telemetry.
# The Worker retains a reported per-isolate compatibility path when this binding
# is absent from an older deployment, but new deployments should keep it.
[[durable_objects.bindings]]
name = "RELAY_SHARED_STATE"
class_name = "RelaySharedState"

[[migrations]]
tag = "relay-shared-state-v1"
new_sqlite_classes = ["RelaySharedState"]
